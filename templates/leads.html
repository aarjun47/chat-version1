<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Leads</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>All Leads</h1>
        <div class="crm-nav">
            <a href="/crm/leads" class="button active">View Leads</a>
            <a href="/crm/appointments" class="button">View Appointments</a>
        </div>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Phone Number</th>
                    <th>Name</th>
                    <th>State</th> <!-- NEW COLUMN: Optional, for debugging -->
                    <!-- REMOVED: <th>Service Interest</th> -->
                    <th>Created At</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for lead in leads %}
                <tr>
                    <td>{{ lead.id }}</td>
                    <td>{{ lead.phone_number }}</td>
                    <td>{{ lead.name if lead.name else 'N/A' }}</td>
                    <td>{{ lead.state }}</td> <!-- NEW DATA: Optional -->
                    <!-- REMOVED: <td>{{ lead.service_interest if lead.service_interest else 'N/A' }}</td> -->
                    <td>{{ lead.created_at.strftime('%Y-%m-%d %H:%M') }}</td>
                    <td><a href="/crm/leads/{{ lead.id }}">View Detail</a></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
